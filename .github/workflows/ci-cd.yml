name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        # Додаємо --legacy-peer-deps, щоб GitHub не "падав" через конфлікт ESLint 10
        run: npm install --legacy-peer-deps

      - name: Run linter
        run: npm run lint

      # Крок закоментований, щоб уникнути помилки "Missing script: test:unit"
      # - name: Run unit tests
      #   run: npm run test:unit

      - name: Build for production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
