name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        # Використовуємо npm install, бо npm ci потребує package-lock.json
        run: npm install

      - name: Run linter
        run: npm run lint

      # Увага! Якщо у тебе ще немає тестів, закоментуй цей крок,
      # інакше пайплайн впаде з помилкою "Missing script: test:unit"
      # - name: Run unit tests
      #   run: npm run test:unit

      - name: Build for production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
